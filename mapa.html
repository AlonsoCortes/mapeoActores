<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de proyectos — SECTEI</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="assets/js/config.js"></script>
  <style>
    body { overflow: hidden; }

    #mapa {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Header flotante ── */
    .map-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      background: var(--header-dark);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-header h1 {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .map-header h1 span {
      color: var(--accent-gold);
      font-weight: 300;
      margin-left: 0.5rem;
    }

    .map-header a {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent);
      padding: 6px 16px;
      border-radius: 6px;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(122,21,53,0.35);
    }
    .map-header a:hover { opacity: 0.88; box-shadow: 0 3px 12px rgba(122,21,53,0.5); }

    .header-stripe {
      position: absolute;
      top: 44px; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      z-index: 10;
    }

    /* ── Panel de leyenda / filtros ── */
    .panel {
      position: absolute;
      top: 62px;
      right: 1rem;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      width: 220px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .panel-title {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text);
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
    }

    .legend-item.dimmed { opacity: 0.35; }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-proyecto    { background: var(--accent); }
    .dot-institucion { background: var(--header-dark); }

    .panel-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.75rem 0;
    }

    .panel-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .panel-count strong { color: var(--accent); }

    /* ── Popup ── */
    .maplibregl-popup-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      font-family: var(--sans);
      min-width: 200px;
      max-width: 280px;
    }

    .maplibregl-popup-tip { display: none; }
    .maplibregl-popup-close-button {
      font-size: 16px;
      color: var(--muted);
      top: 6px;
      right: 8px;
    }

    .popup-tipo {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .popup-nombre {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .popup-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .popup-meta strong { color: var(--text); font-weight: 500; }

    .popup-inst-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .popup-inst-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--header-dark);
      background: rgba(11,61,46,0.07);
      border-radius: 4px;
      padding: 2px 7px;
      width: fit-content;
    }

    /* ── Loader ── */
    #loader {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }
  </style>
</head>
<body>

<div id="mapa"></div>

<div class="map-header">
  <h1>SECTEI <span>Mapa de proyectos</span></h1>
  <a href="admin/">+ registrar</a>
</div>
<div class="header-stripe"></div>

<div class="panel">
  <p class="panel-title">Capas</p>
  <div class="legend-item" id="toggle-proyectos">
    <div class="legend-dot dot-proyecto"></div>
    Proyectos
  </div>
  <div class="legend-item" id="toggle-instituciones">
    <div class="legend-dot dot-institucion"></div>
    Instituciones
  </div>
  <hr class="panel-divider"/>
  <p class="panel-count" id="conteo">cargando…</p>
</div>

<div id="loader">cargando datos…</div>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── Mapa ──
  const mapa = new maplibregl.Map({
    container: 'mapa',
    style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
    center: [-99.133209, 19.432608],
    zoom: 10,
  });

  mapa.addControl(new maplibregl.NavigationControl(), 'bottom-right');
  mapa.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

  // ── Carga de datos ──
  async function cargarDatos() {
    document.getElementById('loader').style.display = 'block';

    const [{ data: proyectos }, { data: instituciones }] = await Promise.all([
      db.from('proyectos').select(`
        id, nombre, objetivo, latitud, longitud,
        proyectos_instituciones (
          tipo_participacion,
          instituciones ( nombre, tipo )
        )
      `),
      db.from('instituciones').select('id, nombre, tipo, alcaldia, latitud, longitud, nivel, parent_id'),
    ]);

    const geoProy = toGeoJSON(proyectos  || [], 'proyecto');
    const geoInst = toGeoJSON(instituciones || [], 'institucion');

    agregarCapa(mapa, 'proyectos',    geoProy, '#7A1535', 9);
    agregarCapa(mapa, 'instituciones', geoInst, '#0B3D2E', 7);

    const nProy = geoProy.features.length;
    const nInst = geoInst.features.length;
    document.getElementById('conteo').innerHTML =
      `<strong>${nProy}</strong> proyectos · <strong>${nInst}</strong> instituciones`;

    document.getElementById('loader').style.display = 'none';
  }

  function toGeoJSON(registros, tipo) {
    return {
      type: 'FeatureCollection',
      features: registros
        .filter(r => r.latitud && r.longitud)
        .map(r => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [r.longitud, r.latitud] },
          properties: { ...r, _tipo: tipo },
        })),
    };
  }

  function agregarCapa(mapa, id, geojson, color, radio) {
    mapa.addSource(id, { type: 'geojson', data: geojson });

    mapa.addLayer({
      id: id + '-halo',
      type: 'circle',
      source: id,
      paint: {
        'circle-radius': radio + 5,
        'circle-color': color,
        'circle-opacity': 0.15,
      },
    });

    mapa.addLayer({
      id: id + '-puntos',
      type: 'circle',
      source: id,
      paint: {
        'circle-radius': radio,
        'circle-color': color,
        'circle-stroke-width': 2,
        'circle-stroke-color': '#ffffff',
      },
    });

    mapa.on('click', id + '-puntos', e => mostrarPopup(e));
    mapa.on('mouseenter', id + '-puntos', () => mapa.getCanvas().style.cursor = 'pointer');
    mapa.on('mouseleave', id + '-puntos', () => mapa.getCanvas().style.cursor = '');
  }

  // ── Popup ──
  function mostrarPopup(e) {
    const props = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates;

    let html = '';

    if (props._tipo === 'proyecto') {
      const insts = JSON.parse(props.proyectos_instituciones || '[]');
      const tagsHTML = insts.length
        ? insts.map(pi => {
            const nombre = pi.instituciones?.nombre ?? '—';
            const tipo   = pi.tipo_participacion ? ` · ${pi.tipo_participacion}` : '';
            return `<span class="popup-inst-tag">${nombre}${tipo}</span>`;
          }).join('')
        : '<span class="popup-meta">Sin instituciones vinculadas</span>';

      html = `
        <p class="popup-tipo">Proyecto</p>
        <p class="popup-nombre">${props.nombre}</p>
        ${props.objetivo ? `<p class="popup-meta">${props.objetivo}</p>` : ''}
        <div class="popup-inst-list">${tagsHTML}</div>`;
    } else {
      const nivelLabel = { 1: 'Organización', 2: 'Departamento', 3: 'Grupo' };
      html = `
        <p class="popup-tipo">${nivelLabel[props.nivel] ?? 'Institución'}</p>
        <p class="popup-nombre">${props.nombre}</p>
        <p class="popup-meta">
          ${props.tipo     ? `<strong>Tipo:</strong> ${props.tipo}<br/>` : ''}
          ${props.alcaldia ? `<strong>Alcaldía:</strong> ${props.alcaldia}` : ''}
        </p>`;
    }

    new maplibregl.Popup({ closeButton: true, maxWidth: '300px' })
      .setLngLat(coords)
      .setHTML(html)
      .addTo(mapa);
  }

  // ── Toggles de capas ──
  function toggleCapa(id, btnId) {
    const btn = document.getElementById(btnId);
    let visible = true;

    btn.addEventListener('click', () => {
      visible = !visible;
      const v = visible ? 'visible' : 'none';
      mapa.setLayoutProperty(id + '-puntos', 'visibility', v);
      mapa.setLayoutProperty(id + '-halo',   'visibility', v);
      btn.classList.toggle('dimmed', !visible);
    });
  }

  // ── Init ──
  mapa.on('load', () => {
    cargarDatos().then(() => {
      toggleCapa('proyectos',    'toggle-proyectos');
      toggleCapa('instituciones', 'toggle-instituciones');
    });
  });
</script>
</body>
</html>

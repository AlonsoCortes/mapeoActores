<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de proyectos — SECTEI</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    body { overflow: hidden; }

    #mapa {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Header flotante ── */
    .map-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      background: #fff;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-header .header-logo { height: 60px; }

    .map-header a {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent);
      padding: 6px 16px;
      border-radius: 6px;
      transition: opacity 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(122,21,53,0.35);
    }
    .map-header a:hover { opacity: 0.88; box-shadow: 0 3px 12px rgba(122,21,53,0.5); }

    .header-stripe {
      position: absolute;
      top: 80px; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      z-index: 10;
    }

    /* ── Panel de leyenda / filtros ── */
    .panel {
      position: absolute;
      top: 96px;
      right: 1rem;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      width: 220px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    .panel-title {
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--text);
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
    }

    .legend-item.dimmed { opacity: 0.35; }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-proyecto    { background: var(--accent); }
    .dot-institucion { background: var(--header-dark); }

    .panel-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.75rem 0;
    }

    .panel-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .panel-count strong { color: var(--accent); }

    /* ── Popup ── */
    .maplibregl-popup-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 8px;
      padding: 1rem 1.1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      font-family: var(--sans);
      min-width: 200px;
      max-width: 280px;
    }

    .maplibregl-popup-tip { display: none; }
    .maplibregl-popup-close-button {
      font-size: 16px;
      color: var(--muted);
      top: 6px;
      right: 8px;
    }

    .popup-tipo {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .popup-nombre {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .popup-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .popup-meta strong { color: var(--text); font-weight: 500; }

    .popup-inst-list {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .popup-inst-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--header-dark);
      background: rgba(11,61,46,0.07);
      border-radius: 4px;
      padding: 2px 7px;
      width: fit-content;
    }

    /* ── Leyenda: polígonos ── */
    .legend-rect {
      width: 16px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Leyenda: símbolo con letra ── */
    .legend-letter {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      font-family: var(--sans);
    }

    .dot-pilar        { background: #7A1535; }
    .dot-utopia       { background: #6B2D8B; }
    .rect-alcaldia    { background: transparent; border: 1.5px solid #1a1a1a; }
    .rect-territorio  { background: rgba(76,175,80,0.5); border: 1.5px solid #1B5E20; }

    /* ── Panel secundario (inferior izquierdo) ── */
    .panel-sec {
      position: absolute;
      bottom: 2.5rem;
      left: 1rem;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      width: 200px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    /* ── Sidebar lateral ── */
    #sidebar {
      position: absolute;
      top: 83px; left: 0;
      width: 290px;
      height: calc(100% - 83px);
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 5;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 0.75rem 1rem 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .sidebar-count {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .sidebar-filters {
      padding: 0.6rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    #search-proyecto {
      width: 100%;
      padding: 0.45rem 0.6rem;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--sans);
      background: var(--surface);
      color: var(--text);
      box-sizing: border-box;
      outline: none;
    }

    #search-proyecto:focus { border-color: var(--accent); }

    #filter-tipo,
    #filter-tematica {
      width: 100%;
      padding: 0.4rem 0.6rem;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--sans);
      background: var(--surface);
      color: var(--text);
      box-sizing: border-box;
    }

    #lista-proyectos {
      flex: 1;
      overflow-y: auto;
      padding: 0.25rem 0;
    }

    .proy-card {
      padding: 0.6rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .proy-card:hover { background: rgba(122,21,53,0.06); }

    .proy-nombre {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      font-family: var(--sans);
      line-height: 1.3;
    }

    .proy-tematica {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--sans);
      font-style: italic;
    }

    .sidebar-empty {
      padding: 1.5rem 1rem;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--sans);
      text-align: center;
    }

    /* Ajustar panel-sec para que no quede bajo el sidebar */
    .panel-sec { left: calc(290px + 1rem); }

    /* ── Loader ── */
    #loader {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      display: none;
    }
  </style>
</head>
<body>

<div id="mapa"></div>

<div class="map-header">
  <div class="header-brand">
    <img src="assets/img/logos/Logo_CDMX.png" alt="Ciudad de México" class="header-logo">
    <img src="assets/img/logos/Logo_Dependencia.png" alt="SECTEI" class="header-logo">
  </div>
  <a href="admin/">+ registrar</a>
</div>
<div class="header-stripe"></div>

<div class="panel">
  <p class="panel-title">Capas</p>
  <div class="legend-item" id="toggle-proyectos">
    <div class="legend-dot dot-proyecto"></div>
    Proyectos
  </div>
  <div class="legend-item" id="toggle-instituciones">
    <div class="legend-dot dot-institucion"></div>
    Instituciones
  </div>
  <hr class="panel-divider"/>
  <p class="panel-count" id="conteo">cargando…</p>
</div>

<div class="panel-sec">
  <p class="panel-title">Capas de contexto</p>
  <div class="legend-item" id="toggle-alcaldias">
    <div class="legend-rect rect-alcaldia"></div>
    Alcaldías
  </div>
  <div class="legend-item dimmed" id="toggle-territoriosPaz">
    <div class="legend-rect rect-territorio"></div>
    Territorios de Paz
  </div>
  <div class="legend-item dimmed" id="toggle-pilares">
    <div class="legend-letter dot-pilar">P</div>
    Pilares
  </div>
  <div class="legend-item dimmed" id="toggle-utopias">
    <div class="legend-letter dot-utopia">U</div>
    Utopías
  </div>
</div>

<aside id="sidebar">
  <div class="sidebar-header">
    <p class="panel-title" style="margin:0">Proyectos</p>
    <span class="sidebar-count" id="sidebar-count">—</span>
  </div>
  <div class="sidebar-filters">
    <input type="text" id="search-proyecto" placeholder="Buscar por nombre…" autocomplete="off"/>
    <select id="filter-tipo">
      <option value="">Todos los tipos</option>
    </select>
    <select id="filter-tematica">
      <option value="">Todas las temáticas</option>
    </select>
  </div>
  <div id="lista-proyectos">
    <p class="sidebar-empty">Cargando proyectos…</p>
  </div>
</aside>

<div id="loader">cargando datos…</div>

<script>
  // ── Mapa ──
  const mapa = new maplibregl.Map({
    container: 'mapa',
    style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
    center: [-99.133209, 19.432608],
    zoom: 10,
  });

  mapa.addControl(new maplibregl.NavigationControl(), 'bottom-right');
  mapa.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

  // ── Estado del sidebar ──
  let todosProyectos = [];

  // ── Carga de datos ──
  async function cargarDatos() {
    document.getElementById('loader').style.display = 'block';

    // El servidor devuelve tematicas[], ubicaciones[{lat,lng}] y
    // proyectos_instituciones[] ya normalizados — sin necesidad de mapear
    const [proyectos, instituciones] = await Promise.all([
      fetch('/api/proyectos').then(r => r.json()),
      fetch('/api/instituciones').then(r => r.json()),
    ]);

    const proyectosNorm = proyectos   || [];
    const instNorm      = instituciones || [];

    const geoProy = toGeoJSON(proyectosNorm, 'proyecto');
    const geoInst = toGeoJSON(instNorm, 'institucion');

    agregarCapa(mapa, 'proyectos',    geoProy, '#7A1535', 9);
    agregarCapa(mapa, 'instituciones', geoInst, '#0B3D2E', 7);

    const nProy = geoProy.features.length;
    const nInst = geoInst.features.length;
    document.getElementById('conteo').innerHTML =
      `<strong>${nProy}</strong> proyectos · <strong>${nInst}</strong> instituciones`;

    todosProyectos = proyectosNorm.filter(p => (p.ubicaciones || []).length > 0);
    poblarSidebar(todosProyectos);

    document.getElementById('loader').style.display = 'none';
  }

  function toGeoJSON(registros, tipo) {
    return {
      type: 'FeatureCollection',
      features: registros.flatMap(r => {
        const pts = r.ubicaciones
          ? r.ubicaciones.filter(u => u.lat && u.lng)
          : (r.latitud && r.longitud ? [{ lat: r.latitud, lng: r.longitud }] : []);
        return pts.map(u => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [u.lng, u.lat] },
          properties: { ...r, _tipo: tipo },
        }));
      }),
    };
  }

  function agregarCapa(mapa, id, geojson, color, radio) {
    mapa.addSource(id, { type: 'geojson', data: geojson });

    mapa.addLayer({
      id: id + '-halo',
      type: 'circle',
      source: id,
      paint: {
        'circle-radius': radio + 5,
        'circle-color': color,
        'circle-opacity': 0.15,
      },
    });

    mapa.addLayer({
      id: id + '-puntos',
      type: 'circle',
      source: id,
      paint: {
        'circle-radius': radio,
        'circle-color': color,
        'circle-stroke-width': 2,
        'circle-stroke-color': '#ffffff',
      },
    });

    mapa.on('click', id + '-puntos', e => mostrarPopup(e));
    mapa.on('mouseenter', id + '-puntos', () => mapa.getCanvas().style.cursor = 'pointer');
    mapa.on('mouseleave', id + '-puntos', () => mapa.getCanvas().style.cursor = '');
  }

  // ── Popup ──
  function mostrarPopup(e) {
    const props = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates;

    let html = '';

    if (props._tipo === 'proyecto') {
      const insts = JSON.parse(props.proyectos_instituciones || '[]');
      const tagsHTML = insts.length
        ? insts.map(pi => {
            const nombre = pi.instituciones?.nombre ?? '—';
            const tipo   = pi.tipo_participacion ? ` · ${pi.tipo_participacion}` : '';
            return `<span class="popup-inst-tag">${nombre}${tipo}</span>`;
          }).join('')
        : '<span class="popup-meta">Sin instituciones vinculadas</span>';

      html = `
        <p class="popup-tipo">Proyecto</p>
        <p class="popup-nombre">${props.nombre}</p>
        ${props.objetivo ? `<p class="popup-meta">${props.objetivo}</p>` : ''}
        <div class="popup-inst-list">${tagsHTML}</div>`;
    } else {
      const nivelLabel = { 1: 'Organización', 2: 'Departamento', 3: 'Grupo' };
      html = `
        <p class="popup-tipo">${nivelLabel[props.nivel] ?? 'Institución'}</p>
        <p class="popup-nombre">${props.nombre}</p>
        <p class="popup-meta">
          ${props.tipo     ? `<strong>Tipo:</strong> ${props.tipo}<br/>` : ''}
          ${props.alcaldia ? `<strong>Alcaldía:</strong> ${props.alcaldia}` : ''}
        </p>`;
    }

    new maplibregl.Popup({ closeButton: true, maxWidth: '300px' })
      .setLngLat(coords)
      .setHTML(html)
      .addTo(mapa);
  }

  // ── Sidebar: render de tarjetas ──
  function poblarSidebar(proyectos) {
    const lista    = document.getElementById('lista-proyectos');
    const contador = document.getElementById('sidebar-count');
    const selTem  = document.getElementById('filter-tematica');
    const selTipo = document.getElementById('filter-tipo');

    // Poblar dropdowns solo la primera vez
    if (selTem.options.length === 1) {
      const tematicas = [...new Set(
        todosProyectos.flatMap(p => p.tematicas)
      )].sort();
      tematicas.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        selTem.appendChild(opt);
      });
    }
    if (selTipo.options.length === 1) {
      const tipos = [...new Set(
        todosProyectos.map(p => p.tipo_proyecto).filter(Boolean)
      )].sort();
      tipos.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        selTipo.appendChild(opt);
      });
    }

    lista.innerHTML = '';

    if (!proyectos.length) {
      lista.innerHTML = '<p class="sidebar-empty">Sin resultados</p>';
      contador.textContent = '0 resultados';
      return;
    }

    proyectos.forEach(p => {
      const card = document.createElement('div');
      card.className = 'proy-card';
      card.dataset.id = p.id;
      card.innerHTML = `
        <span class="proy-nombre">${p.nombre}</span>
        ${p.tematicas.length ? p.tematicas.map(t => `<span class="proy-tematica">${t}</span>`).join('') : ''}
      `;
      card.addEventListener('click', () => {
        const ubs = p.ubicaciones;
        if (ubs.length === 1) {
          mapa.flyTo({ center: [ubs[0].lng, ubs[0].lat], zoom: 14, duration: 800 });
        } else {
          const bounds = ubs.reduce(
            (b, u) => b.extend([u.lng, u.lat]),
            new maplibregl.LngLatBounds([ubs[0].lng, ubs[0].lat], [ubs[0].lng, ubs[0].lat])
          );
          mapa.fitBounds(bounds, { padding: 80, duration: 800 });
        }

        const insts = Array.isArray(p.proyectos_instituciones) ? p.proyectos_instituciones : [];
        const tagsHTML = insts.length
          ? insts.map(pi => {
              const nombre = pi.instituciones?.nombre ?? '—';
              const tipo   = pi.tipo_participacion ? ` · ${pi.tipo_participacion}` : '';
              return `<span class="popup-inst-tag">${nombre}${tipo}</span>`;
            }).join('')
          : '<span class="popup-meta">Sin instituciones vinculadas</span>';

        new maplibregl.Popup({ closeButton: true, maxWidth: '300px' })
          .setLngLat([ubs[0].lng, ubs[0].lat])
          .setHTML(`
            <p class="popup-tipo">Proyecto</p>
            <p class="popup-nombre">${p.nombre}</p>
            ${p.objetivo ? `<p class="popup-meta">${p.objetivo}</p>` : ''}
            <div class="popup-inst-list">${tagsHTML}</div>
          `)
          .addTo(mapa);
      });
      lista.appendChild(card);
    });

    contador.textContent = `${proyectos.length} resultado${proyectos.length !== 1 ? 's' : ''}`;
  }

  // ── Sidebar: filtrado combinado ──
  function filtrarSidebar() {
    const texto    = document.getElementById('search-proyecto').value.toLowerCase().trim();
    const tematica = document.getElementById('filter-tematica').value;
    const tipo     = document.getElementById('filter-tipo').value;

    const filtrados = todosProyectos.filter(p => {
      const coincideNombre = p.nombre.toLowerCase().includes(texto);
      const coincideTem    = !tematica || p.tematicas.includes(tematica);
      const coincideTipo   = !tipo     || p.tipo_proyecto === tipo;
      return coincideNombre && coincideTem && coincideTipo;
    });

    poblarSidebar(filtrados);
  }

  // ── Capas estáticas GeoJSON ──
  function cargarCapasEstaticas() {
    // Alcaldías — polígono sin relleno, borde negro delgado + etiquetas
    mapa.addSource('alcaldias', { type: 'geojson', data: 'assets/geojson/alcaldias_2020.geojson' });
    mapa.addLayer({
      id: 'alcaldias-fill',
      type: 'fill',
      source: 'alcaldias',
      paint: { 'fill-opacity': 0 },
    });
    mapa.addLayer({
      id: 'alcaldias-border',
      type: 'line',
      source: 'alcaldias',
      paint: { 'line-color': '#1a1a1a', 'line-width': 0.8 },
    });
    mapa.addLayer({
      id: 'alcaldias-labels',
      type: 'symbol',
      source: 'alcaldias',
      layout: {
        'text-field': ['get', 'NOMGEO'],
        'text-font': ['Open Sans Semibold', 'Arial Unicode MS Regular'],
        'text-size': 11,
        'text-anchor': 'center',
      },
      paint: {
        'text-color': '#333333',
        'text-halo-color': '#ffffff',
        'text-halo-width': 1.5,
      },
    });

    // Territorios de Paz — polígono verde 50% + borde verde oscuro delgado (oculto por defecto)
    mapa.addSource('territoriosPaz', { type: 'geojson', data: 'assets/geojson/territoriosPaz_052026.geojson' });
    mapa.addLayer({
      id: 'territoriosPaz-fill',
      type: 'fill',
      source: 'territoriosPaz',
      layout: { 'visibility': 'none' },
      paint: { 'fill-color': '#4CAF50', 'fill-opacity': 0.5 },
    });
    mapa.addLayer({
      id: 'territoriosPaz-border',
      type: 'line',
      source: 'territoriosPaz',
      layout: { 'visibility': 'none' },
      paint: { 'line-color': '#1B5E20', 'line-width': 1 },
    });

    // Pilares — círculo guinda con "P" blanca en negritas (oculto por defecto)
    mapa.addSource('pilares', { type: 'geojson', data: 'assets/geojson/pilares_2026.geojson' });
    mapa.addLayer({
      id: 'pilares-circle',
      type: 'circle',
      source: 'pilares',
      layout: { 'visibility': 'none' },
      paint: {
        'circle-radius': 8,
        'circle-color': '#7A1535',
        'circle-stroke-width': 1.5,
        'circle-stroke-color': '#ffffff',
      },
    });
    mapa.addLayer({
      id: 'pilares-text',
      type: 'symbol',
      source: 'pilares',
      layout: {
        'visibility': 'none',
        'text-field': 'P',
        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
        'text-size': 9,
        'text-allow-overlap': true,
        'text-ignore-placement': true,
      },
      paint: { 'text-color': '#ffffff' },
    });

    // Utopías — círculo morado con "U" blanca en negritas (oculto por defecto)
    mapa.addSource('utopias', { type: 'geojson', data: 'assets/geojson/utopias_052026.geojson' });
    mapa.addLayer({
      id: 'utopias-circle',
      type: 'circle',
      source: 'utopias',
      layout: { 'visibility': 'none' },
      paint: {
        'circle-radius': 10,
        'circle-color': '#6B2D8B',
        'circle-stroke-width': 1.5,
        'circle-stroke-color': '#ffffff',
      },
    });
    mapa.addLayer({
      id: 'utopias-text',
      type: 'symbol',
      source: 'utopias',
      layout: {
        'visibility': 'none',
        'text-field': 'U',
        'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
        'text-size': 11,
        'text-allow-overlap': true,
        'text-ignore-placement': true,
      },
      paint: { 'text-color': '#ffffff' },
    });

    // Cursores y popups para capas de puntos
    ['pilares-circle', 'utopias-circle'].forEach(layer => {
      mapa.on('mouseenter', layer, () => mapa.getCanvas().style.cursor = 'pointer');
      mapa.on('mouseleave', layer, () => mapa.getCanvas().style.cursor = '');
    });

    mapa.on('click', 'pilares-circle', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup({ closeButton: true, maxWidth: '280px' })
        .setLngLat(e.features[0].geometry.coordinates)
        .setHTML(`
          <p class="popup-tipo">Pilar</p>
          <p class="popup-nombre">${p.nombre}</p>
          <p class="popup-meta">
            ${p.alcaldia  ? `<strong>Alcaldía:</strong> ${p.alcaldia}<br/>` : ''}
            ${p.direccion ? `<strong>Dirección:</strong> ${p.direccion}<br/>` : ''}
            ${p.horario   ? `<strong>Horario:</strong> ${p.horario}` : ''}
          </p>`)
        .addTo(mapa);
    });

    mapa.on('click', 'utopias-circle', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup({ closeButton: true, maxWidth: '280px' })
        .setLngLat(e.features[0].geometry.coordinates)
        .setHTML(`
          <p class="popup-tipo">Utopía</p>
          <p class="popup-nombre">${p.nombre}</p>`)
        .addTo(mapa);
    });
  }

  // ── Toggles de capas (múltiples layers por capa) ──
  function toggleCapas(layers, btnId, defaultVisible = true) {
    const btn = document.getElementById(btnId);
    let visible = defaultVisible;
    btn.addEventListener('click', () => {
      visible = !visible;
      const v = visible ? 'visible' : 'none';
      layers.forEach(id => mapa.setLayoutProperty(id, 'visibility', v));
      btn.classList.toggle('dimmed', !visible);
    });
  }

  // ── Toggles de capas ──
  function toggleCapa(id, btnId) {
    const btn = document.getElementById(btnId);
    let visible = true;

    btn.addEventListener('click', () => {
      visible = !visible;
      const v = visible ? 'visible' : 'none';
      mapa.setLayoutProperty(id + '-puntos', 'visibility', v);
      mapa.setLayoutProperty(id + '-halo',   'visibility', v);
      btn.classList.toggle('dimmed', !visible);
    });
  }

  // ── Init ──
  mapa.on('load', () => {
    cargarCapasEstaticas();
    toggleCapas(['alcaldias-fill', 'alcaldias-border', 'alcaldias-labels'], 'toggle-alcaldias',      true);
    toggleCapas(['territoriosPaz-fill', 'territoriosPaz-border'],           'toggle-territoriosPaz', false);
    toggleCapas(['pilares-circle', 'pilares-text'],                          'toggle-pilares',        false);
    toggleCapas(['utopias-circle', 'utopias-text'],                          'toggle-utopias',        false);

    cargarDatos().then(() => {
      toggleCapa('proyectos',    'toggle-proyectos');
      toggleCapa('instituciones', 'toggle-instituciones');
      document.getElementById('search-proyecto').addEventListener('input',  filtrarSidebar);
      document.getElementById('filter-tematica').addEventListener('change', filtrarSidebar);
      document.getElementById('filter-tipo').addEventListener('change',     filtrarSidebar);
    });
  });
</script>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Crear config.js con credenciales
        run: |
          echo "const SUPABASE_URL  = '${{ secrets.SUPABASE_URL }}';" > assets/js/config.js
          echo "const SUPABASE_ANON = '${{ secrets.SUPABASE_ANON }}';" >> assets/js/config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
